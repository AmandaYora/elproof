name: Build and push image

# This VPS never builds (2 GB RAM) — see knowledge/decisions/ADR-0011 and
# docs/DEPLOYMENT.md. This workflow is the only place the Docker image gets
# built; the server only ever `docker pull`s the tag this pushes, then runs
# `~/elproof/deploy.sh <git-sha>`.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/amandayora/elproof

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Pushed ${{ env.IMAGE }}:${{ github.sha }} and :latest" >> "$GITHUB_STEP_SUMMARY"
          echo "Deploy on the VPS with: cd ~/elproof && ./deploy.sh ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
